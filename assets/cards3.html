<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <!-- Soft Drop Shadow for SaaS Look -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08" />
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.04" />
    </filter>

    <!-- Card 1: Video Editing -->
    <g id="card-video">
      <rect width="320" height="200" rx="16" fill="#ffffff" filter="url(#shadow)" stroke="#f1f5f9" stroke-width="2" />

      <!-- Header -->
      <rect x="24" y="24" width="36" height="36" rx="10" fill="#fee2e2" />
      <path d="M38 42 l0 -12 l10 6 z" fill="#ef4444" />
      <text x="76" y="47" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700"
        fill="#0f172a">Video Editing</text>

      <!-- Video Timeline UI -->
      <rect x="24" y="76" width="272" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />

      <!-- Timeline Tracks -->
      <rect x="40" y="96" width="100" height="12" rx="6" fill="#cbd5e1" />
      <rect x="150" y="96" width="80" height="12" rx="6" fill="#94a3b8" />

      <rect x="40" y="120" width="160" height="12" rx="6" fill="#818cf8" />
      <rect x="210" y="120" width="60" height="12" rx="6" fill="#c084fc" />

      <rect x="40" y="144" width="120" height="12" rx="6" fill="#fb7185" />
      <rect x="170" y="144" width="90" height="12" rx="6" fill="#f43f5e" />

      <!-- Animated Playhead -->
      <g class="playhead">
        <line x1="60" y1="80" x2="60" y2="168" stroke="#ef4444" stroke-width="2" />
        <polygon points="54,80 66,80 60,88" fill="#ef4444" />
      </g>
    </g>

    <!-- Card 2: Web Design -->
    <g id="card-web">
      <rect width="320" height="200" rx="16" fill="#ffffff" filter="url(#shadow)" stroke="#f1f5f9" stroke-width="2" />

      <!-- Header -->
      <rect x="24" y="24" width="36" height="36" rx="10" fill="#dbeafe" />
      <circle cx="42" cy="42" r="8" stroke="#3b82f6" stroke-width="2.5" fill="none" />
      <ellipse cx="42" cy="42" rx="3.5" ry="8" stroke="#3b82f6" stroke-width="2.5" fill="none" />
      <line x1="33" y1="42" x2="51" y2="42" stroke="#3b82f6" stroke-width="2.5" />
      <text x="76" y="47" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700"
        fill="#0f172a">Web Design</text>

      <!-- Browser UI -->
      <rect x="24" y="76" width="272" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
      <circle cx="40" cy="90" r="4" fill="#fca5a5" />
      <circle cx="52" cy="90" r="4" fill="#fde047" />
      <circle cx="64" cy="90" r="4" fill="#86efac" />
      <line x1="24" y1="102" x2="296" y2="102" stroke="#e2e8f0" stroke-width="1" />

      <!-- Layout Blocks -->
      <rect x="36" y="114" width="44" height="48" rx="6" fill="#e2e8f0" />
      <rect x="92" y="114" width="140" height="28" rx="6" fill="#dbeafe" class="web-hero" />
      <rect x="92" y="150" width="66" height="12" rx="4" fill="#f1f5f9" />
      <rect x="166" y="150" width="66" height="12" rx="4" fill="#f1f5f9" />

      <!-- Animated Cursor -->
      <g class="cursor">
        <path d="M0,0 L11,26 L16,16 L26,11 Z" fill="#1e293b" stroke="#ffffff" stroke-width="2" />
      </g>
    </g>

    <!-- Card 3: Presentations Design -->
    <g id="card-pres">
      <rect width="320" height="200" rx="16" fill="#ffffff" filter="url(#shadow)" stroke="#f1f5f9" stroke-width="2" />

      <!-- Header -->
      <rect x="24" y="24" width="36" height="36" rx="10" fill="#d1fae5" />
      <rect x="34" y="38" width="4" height="8" rx="1" fill="#10b981" />
      <rect x="40" y="32" width="4" height="14" rx="1" fill="#10b981" />
      <rect x="46" y="28" width="4" height="18" rx="1" fill="#10b981" />
      <text x="76" y="47" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700"
        fill="#0f172a">Presentations</text>

      <!-- Chart UI -->
      <rect x="24" y="76" width="272" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
      <line x1="48" y1="156" x2="272" y2="156" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" />

      <!-- Animated Bars -->
      <rect x="64" y="106" width="32" height="48" rx="4" fill="#38bdf8" class="bar bar1" />
      <rect x="112" y="86" width="32" height="68" rx="4" fill="#a78bfa" class="bar bar2" />
      <rect x="160" y="116" width="32" height="38" rx="4" fill="#f472b6" class="bar bar3" />
      <rect x="208" y="96" width="32" height="58" rx="4" fill="#fbbf24" class="bar bar4" />
    </g>
  </defs>

  <style>
    /* --- MAIN MOVEMENT --- */
    .move-c1 {
      animation: move-c1 9s infinite ease-in-out;
      transform-origin: 160px 100px;
    }

    .move-c2 {
      animation: move-c2 9s infinite ease-in-out;
      transform-origin: 160px 100px;
    }

    .move-c3 {
      animation: move-c3 9s infinite ease-in-out;
      transform-origin: 160px 100px;
    }

    /* TRANSFORM KEYFRAMES 
      Cards loop through 3 distinct physical positions:
      Front: (0, 0) scale 1
      Mid:   (30, -30) scale 0.9
      Back:  (60, -60) scale 0.8
    */
    @keyframes move-c1 {

      0%,
      20% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      26% {
        transform: translate(-15px, -15px) scale(1.05);
        opacity: 0;
      }

      26.01% {
        transform: translate(60px, -60px) scale(0.8);
        opacity: 0;
      }

      33.33%,
      53.33% {
        transform: translate(60px, -60px) scale(0.8);
        opacity: 1;
      }

      66.66%,
      86.66% {
        transform: translate(30px, -30px) scale(0.9);
        opacity: 1;
      }

      100% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
    }

    @keyframes move-c2 {

      0%,
      20% {
        transform: translate(30px, -30px) scale(0.9);
        opacity: 1;
      }

      33.33%,
      53.33% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      59.33% {
        transform: translate(-15px, -15px) scale(1.05);
        opacity: 0;
      }

      59.34% {
        transform: translate(60px, -60px) scale(0.8);
        opacity: 0;
      }

      66.66%,
      86.66% {
        transform: translate(60px, -60px) scale(0.8);
        opacity: 1;
      }

      100% {
        transform: translate(30px, -30px) scale(0.9);
        opacity: 1;
      }
    }

    @keyframes move-c3 {

      0%,
      20% {
        transform: translate(60px, -60px) scale(0.8);
        opacity: 1;
      }

      33.33%,
      53.33% {
        transform: translate(30px, -30px) scale(0.9);
        opacity: 1;
      }

      66.66%,
      86.66% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      92.66% {
        transform: translate(-15px, -15px) scale(1.05);
        opacity: 0;
      }

      92.67% {
        transform: translate(60px, -60px) scale(0.8);
        opacity: 0;
      }

      100% {
        transform: translate(60px, -60px) scale(0.8);
        opacity: 1;
      }
    }

    /* --- Z-INDEX VISIBILITY (OPACITY) --- 
       Layer swaps now happen EXACTLY when the front card hits 0% opacity.
    */
    .c1-front {
      animation: o-c1-front 9s infinite;
    }

    .c1-mid {
      animation: o-c1-mid 9s infinite;
    }

    .c1-back {
      animation: o-c1-back 9s infinite;
    }

    .c2-front {
      animation: o-c2-front 9s infinite;
    }

    .c2-mid {
      animation: o-c2-mid 9s infinite;
    }

    .c2-back {
      animation: o-c2-back 9s infinite;
    }

    .c3-front {
      animation: o-c3-front 9s infinite;
    }

    .c3-mid {
      animation: o-c3-mid 9s infinite;
    }

    .c3-back {
      animation: o-c3-back 9s infinite;
    }

    /* Card 1 Visibility */
    @keyframes o-c1-front {

      0%,
      26% {
        opacity: 1;
      }

      26.01%,
      92.65% {
        opacity: 0;
      }

      92.66%,
      100% {
        opacity: 1;
      }
    }

    @keyframes o-c1-back {

      0%,
      25.99% {
        opacity: 0;
      }

      26%,
      59.33% {
        opacity: 1;
      }

      59.34%,
      100% {
        opacity: 0;
      }
    }

    @keyframes o-c1-mid {

      0%,
      59.32% {
        opacity: 0;
      }

      59.33%,
      92.66% {
        opacity: 1;
      }

      92.67%,
      100% {
        opacity: 0;
      }
    }

    /* Card 2 Visibility */
    @keyframes o-c2-mid {

      0%,
      26% {
        opacity: 1;
      }

      26.01%,
      92.65% {
        opacity: 0;
      }

      92.66%,
      100% {
        opacity: 1;
      }
    }

    @keyframes o-c2-front {

      0%,
      25.99% {
        opacity: 0;
      }

      26%,
      59.33% {
        opacity: 1;
      }

      59.34%,
      100% {
        opacity: 0;
      }
    }

    @keyframes o-c2-back {

      0%,
      59.32% {
        opacity: 0;
      }

      59.33%,
      92.66% {
        opacity: 1;
      }

      92.67%,
      100% {
        opacity: 0;
      }
    }

    /* Card 3 Visibility */
    @keyframes o-c3-back {

      0%,
      26% {
        opacity: 1;
      }

      26.01%,
      92.65% {
        opacity: 0;
      }

      92.66%,
      100% {
        opacity: 1;
      }
    }

    @keyframes o-c3-mid {

      0%,
      25.99% {
        opacity: 0;
      }

      26%,
      59.33% {
        opacity: 1;
      }

      59.34%,
      100% {
        opacity: 0;
      }
    }

    @keyframes o-c3-front {

      0%,
      59.32% {
        opacity: 0;
      }

      59.33%,
      92.66% {
        opacity: 1;
      }

      92.67%,
      100% {
        opacity: 0;
      }
    }


    /* --- MICRO-ANIMATIONS (Internal Card Contents) --- */

    /* Video Edit: Playhead slide */
    .playhead {
      animation: playhead 3s infinite ease-in-out;
    }

    @keyframes playhead {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(180px);
      }
    }

    /* Web Design: Cursor & Hover State */
    .cursor {
      animation: cursor 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cursor {

      0%,
      100% {
        transform: translate(140px, 140px);
      }

      50% {
        transform: translate(160px, 110px);
      }
    }

    .web-hero {
      animation: hero-hover 4s infinite;
      transition: fill 0.3s;
    }

    @keyframes hero-hover {

      0%,
      40%,
      100% {
        fill: #dbeafe;
      }

      50%,
      60% {
        fill: #bfdbfe;
      }
    }

    /* Presentations: Chart Bars growth */
    .bar {
      transform-origin: bottom;
      transform-box: fill-box;
    }

    .bar1 {
      animation: b1 2s infinite ease-in-out alternate;
    }

    .bar2 {
      animation: b2 2.5s infinite ease-in-out alternate-reverse;
    }

    .bar3 {
      animation: b3 3s infinite ease-in-out alternate;
    }

    .bar4 {
      animation: b4 2.2s infinite ease-in-out alternate-reverse;
    }

    @keyframes b1 {
      0% {
        transform: scaleY(0.5);
      }

      100% {
        transform: scaleY(1.1);
      }
    }

    @keyframes b2 {
      0% {
        transform: scaleY(0.7);
      }

      100% {
        transform: scaleY(1.2);
      }
    }

    @keyframes b3 {
      0% {
        transform: scaleY(0.8);
      }

      100% {
        transform: scaleY(1.3);
      }
    }

    @keyframes b4 {
      0% {
        transform: scaleY(0.6);
      }

      100% {
        transform: scaleY(1.1);
      }
    }
  </style>

  <!-- Global SVG Background -->
  <rect width="100%" height="100%" fill="#f1f5f9" />

  <!-- Center Scene container -->
  <g transform="translate(140, 210)">

    <!-- LAYER 1: BACK (Drawn First, stays behind) -->
    <g class="layer-back">
      <g class="c1-back">
        <use href="#card-video" class="move-c1" />
      </g>
      <g class="c2-back">
        <use href="#card-web" class="move-c2" />
      </g>
      <g class="c3-back">
        <use href="#card-pres" class="move-c3" />
      </g>
    </g>

    <!-- LAYER 2: MIDDLE -->
    <g class="layer-mid">
      <g class="c1-mid">
        <use href="#card-video" class="move-c1" />
      </g>
      <g class="c2-mid">
        <use href="#card-web" class="move-c2" />
      </g>
      <g class="c3-mid">
        <use href="#card-pres" class="move-c3" />
      </g>
    </g>

    <!-- LAYER 3: FRONT (Drawn Last, visually on top) -->
    <g class="layer-front">
      <g class="c1-front">
        <use href="#card-video" class="move-c1" />
      </g>
      <g class="c2-front">
        <use href="#card-web" class="move-c2" />
      </g>
      <g class="c3-front">
        <use href="#card-pres" class="move-c3" />
      </g>
    </g>

  </g>
</svg>
